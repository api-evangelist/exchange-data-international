sources:
  - url: https://developer.exchange-data.com/
    type: Portal
    note: Self-serve registration, API Playground, catalogue of 24 API products plus several marked coming soon (Bond Sigma, Universal Depositary Receipts, Worldwide Cost Basis, Short Interest Data, US Mutual Funds).
  - url: https://developer.exchange-data.com/api-documentation/
    type: Documentation
    note: Per-product documentation pages each show a Get{Product} endpoint on https://api3.exchange-data.com with JSON/PSV formats; the US Economic Data page shows its endpoint with an http:// scheme on the same host.
  - url: https://developer.exchange-data.com/api-documentation/world_corporate_actions
    type: Documentation
    note: GetLatestCorporateActions with 200+ output fields, queried by OperationalMic/LocalCode/ISIN/EventCD.
  - url: https://developer.exchange-data.com/api-documentation/end_of_day_pricing_data
    type: Documentation
    note: GetLatestEODPrices with MIC/LocalCode/ISIN parameters, pagination via next token, pageCount/totalCount.
  - url: https://www.exchange-data.com/
    type: Website
    note: Advertises data delivery by SFTP, API and more across corporate actions, pricing, reference, fixed income, derivatives, economic, and funds data.
actions:
  openapiHarvested: false
  reason: |
    No public machine-readable spec exists to harvest. The 24 documented
    endpoints, shared base URL, and parameter patterns were captured into
    apis.yml from the developer portal documentation pages verbatim; authoring
    a spec from prose would be fabrication, so the openapi/ folder was omitted.
