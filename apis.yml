aid: exchange-data-international
url: https://raw.githubusercontent.com/api-evangelist/exchange-data-international/refs/heads/main/apis.yml
name: Exchange Data International
kind: company
description: 'Exchange Data International (EDI) is an independent, privately held financial
  data vendor founded in 1994 by Jonathan Bloch and headquartered in London, with operations
  in the USA, India, and Morocco serving 450+ institutional clients. EDI sells securities
  reference data, worldwide equity and fixed income corporate actions, end-of-day pricing,
  adjustment factors, shares outstanding, derivatives reference and pricing, economic indicators
  and calendars, fund NAVs, and FX rates. Data is delivered as SFTP flat-file feeds and through
  a self-serve REST API: the EDI Developer portal (developer.exchange-data.com) documents
  24 API products on a shared base at api3.exchange-data.com, with account registration, an
  API Playground, per-product subscriptions, and JSON or pipe-separated responses. No public
  OpenAPI or AsyncAPI specification is published.'
accessModel:
  pricing: subscription
  onboarding: self-service
  trial: true
  try_now: false
  public: false
  label: Self-serve subscription with free playground
  confidence: medium
  source:
  - https://developer.exchange-data.com/p/api-faq
  - https://developer.exchange-data.com/p/developers-and-startups
  generated: '2026-07-22'
  method: searched
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/icons/exchange-data-international.png
tags:
- Financial
- Market Data
